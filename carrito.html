    <link rel="stylesheet" href="./css/styles.css">

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm" style="background:#c0392b;">
            <div class="container">
                <a class="navbar-brand fw-bold fs-3" href="index.html">
                    <i class="bi bi-shop text-warning"></i> TONY' PIZZAS
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Abrir menú">

                <div class="collapse navbar-collapse" id="navbarNav">

                    </ul>
                    <a href="carrito.html" class="btn btn-warning position-relative fw-bold text-dark px-4 ms-lg-3">

                <div class="row align-items-center">

                    <div class="col-md-6 text-md-end mt-3 mt-md-0">
                        <button id="btnFinalizar" class="btn btn-success btn-lg px-5 fw-bold">

                </div>

        </div>

    <footer class="footer text-center text-white p-4 mt-5 shadow-lg" style="background:#2c3e50;">

            <h4 class="fw-bold">TONY' PIZZAS</h4>

<html lang="es">
<head>
  <meta charset="UTF-8">

  <script src="./js/app.js" defer></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
 <!-- Librería de Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
 <header>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm" style="background-color: #c0392b;">
    <div class="container">

      <!-- Logo -->
      <a class="navbar-brand fw-bold fs-3" href="index.html">
        <i class="bi bi-shop text-warning"></i> TONY' PIZZAS
      </a>

      <!-- Botón responsive -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menú -->
      <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav me-auto fs-5">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Inicio / Menú</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="aboutMe.html">About Me</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="contacto.html">Contacto</a>
          </li>
        </ul>

        <!-- Carrito -->
        <a href="carrito.html"
          class="btn btn-warning position-relative fw-bold text-dark px-4">

          <i class="bi bi-cart-fill"></i> Mi Carrito

          <span id="contador-carrito"
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark">
            0
          </span>

        </a>

      </div>
    </div>
  </nav>
</header>

  <!-- FORMULARIO DE CONTACTO -->
  <main class="main container mt-5 pt-4">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm p-4">
          <h2 class="text-center mb-4" style="color: #c0392b;">Dejanos tu mensaje</h2>
          <form>
            <div class="mb-3">
              <label for="nombre" class="form-label fw-bold">Nombre completo</label>
              <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan Pérez" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label fw-bold">Correo Electrónico</label>
              <input type="email" class="form-control" id="email" placeholder="juan@ejemplo.com" required>
            </div>
            <div class="mb-3">
              <label for="mensaje" class="form-label fw-bold">Mensaje</label>
              <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribí tu consulta acá..." required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold fs-5">Enviar Mensaje</button>
          </form>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer text-center text-white p-4 mt-5 shadow-lg" style="background-color: #2c3e50;">
    <div class="container">
      <h4 class="fw-bold">TONY'PIZZAS</h4>
      <p class="mb-1">Las mejores pizzas de CABA, directo a tu mesa.</p>
      <small>© 2026 Tony. Todos los derechos reservados.</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
